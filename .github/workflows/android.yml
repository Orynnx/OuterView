name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 37
        run: sdkmanager "platforms;android-37" "build-tools;37.0.0"
      - name: Verify Dino Run package
        run: python demo/dino-run/build_demo.py --check
      - name: Test and build
        run: ./gradlew :core:testDebugUnitTest :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: OuterView-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
